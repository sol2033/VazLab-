name: vazlab
description: "VazLab - Диагностика и тюнинг автомобилей Lada (ВАЗ)"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  
  # Bluetooth для подключения к ELM327
  flutter_bluetooth_serial: ^0.4.0
  
  # Разрешения
  permission_handler: ^11.0.0
  
  # State management
  provider: ^6.1.0
  
  # База данных SQLite
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  path: ^1.8.3
  
  # UI компоненты
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  
  # Утилиты
  intl: ^0.18.0
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  # Ассеты
  assets:
    - assets/data/
    - assets/images/
